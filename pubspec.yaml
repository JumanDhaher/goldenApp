name: golden_app
description: Gold Tracking & Zakat App - تطبيق تتبع الذهب والزكاة
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.2.0

  # Image
  image_picker: ^1.1.2

  # PDF Export
  pdf: ^3.11.1
  printing: ^5.13.1

  # Network
  http: ^1.2.2

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.4
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  flutter_gen: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  hive_generator: ^2.0.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
